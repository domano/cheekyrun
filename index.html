<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cheeky Run</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍑</text></svg>">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="game"></div>
  <div id="fx"></div>

  <div id="hud" class="hide">
    <div class="pill"><small>Score</small><span id="score">0</span></div>
    <div class="pill">🧻<span id="rolls">0</span></div>
  </div>
  <div id="scorePop">+15</div>
  <button id="muteBtn" title="Sound on/off">🔊</button>

  <div id="overlay" class="scrim">
    <div class="card">
      <div class="float">🍑👂</div>
      <div class="title">Cheeky Run</div>
      <div class="tag">a butt with ears, on the run</div>
      <div class="how">
        <b>Swipe ◀ ▶</b> &nbsp;change lanes<br>
        <b>Tap / swipe ▲</b> &nbsp;hop (double-jump!)<br>
        <b>Swipe ▼</b> &nbsp;duck under bars<br>
        🧻 grab rolls &nbsp;·&nbsp; 🌵 dodge cacti
      </div><br>
      <button class="btn" id="startBtn">Let's go!</button>
    </div>
  </div>

  <div id="gameover" class="scrim hide">
    <div class="card">
      <div style="font-size:50px">😵🍑</div>
      <div class="title" style="font-size:32px;margin-top:6px">Wiped out!</div>
      <div class="final">Score <span id="finalScore">0</span></div>
      <div class="best" id="bestLine">Best: 0</div>
      <button class="btn" id="againBtn">Again!</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
